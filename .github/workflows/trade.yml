name: "CuanBot v4 - Auto Trade"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ─────────────────────────────────────────────────────────────────────
# TRIGGER: Otomatis tiap 5 menit ATAU manual dari GitHub UI
# ─────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "*/5 * * * *"   # Tiap 5 menit, 24/7

  workflow_dispatch:
    inputs:
      action:
        description: "Pilih aksi yang akan dijalankan"
        required: true
        default: "auto"
        type: choice
        options:
          - auto         # Jalankan bot normal (scan + auto trade)
          - scan-only    # Scan saja, lihat kondisi market tanpa transaksi
          - dry-run      # Simulasi lengkap (scan + log), tidak ada transaksi nyata
          - force-buy    # PAKSA BELI coin tertentu (isi 'symbol' di bawah)
          - force-sell   # JUAL SEMUA posisi terbuka sekarang

      symbol:
        description: "Coin untuk force-buy (contoh: DOGE, XRP, HBAR, FLOKI)"
        required: false
        default: ""

# ─────────────────────────────────────────────────────────────────────
# CONCURRENCY: Hanya 1 run boleh eksekusi pada satu waktu.
# Run baru jadi pending (tidak membatalkan run aktif), pending lama diganti
# pending baru → mencegah race condition saat menulis state.json.
# ─────────────────────────────────────────────────────────────────────
concurrency:
  group: trade
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Setup Python ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Restore state ─────────────────────────────────────────
      - name: Restore state
        run: |
          if git ls-remote --heads origin state | grep -q state; then
            git fetch origin state
            if git show origin/state:state.json > /dev/null 2>&1; then
              git show origin/state:state.json > state.json
              echo "State restored:"
              python3 -c "
          import json, sys
          try:
              s = json.load(open('state.json'))
              pos = s.get('positions', [])
              print(f'  Posisi terbuka : {len(pos)}')
              for p in pos:
                  pnl_str = ''
                  print(f'    -> {p[\"symbol\"]} entry Rp {p[\"entry_price\"]:,.0f}')
              print(f'  Trades hari ini: {len(s.get(\"trades_today\", []))}')
              print(f'  PnL hari ini   : Rp {s.get(\"daily_pnl\", 0):,.0f}')
              print(f'  Total PnL      : Rp {s.get(\"total_pnl\", 0):,.0f}')
              print(f'  Compound pool  : Rp {s.get(\"compound_profit\", 0):,.0f}')
          except Exception as e:
              print(f'  (tidak bisa baca state: {e})')
          "
            else
              echo "Branch state ada tapi state.json tidak ditemukan, mulai fresh"
            fi
          else
            echo "Belum ada branch state, mulai fresh"
          fi

      # ── 3.5. Set up WARP (Bypass Geo-blocking) ───────────────────
      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.4

      # ── 4. Jalankan Bot ──────────────────────────────────────────
      - name: Run CuanBot
        env:
          TOKOCRYPTO_API_KEY:    ${{ secrets.TOKOCRYPTO_API_KEY }}
          TOKOCRYPTO_SECRET_KEY: ${{ secrets.TOKOCRYPTO_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          ZAI_API_KEY:           ${{ secrets.ZAI_API_KEY }}
          ZAI_API_URL:           ${{ secrets.ZAI_API_URL }}
          NOTIFY_SCAN:    "false"
          DRY_RUN:        "false"
        run: |
          ACTION="${{ github.event.inputs.action }}"
          SYMBOL="${{ github.event.inputs.symbol }}"

          # Default untuk scheduled run = auto (live)
          if [ -z "$ACTION" ]; then
            ACTION="auto"
          fi

          echo "=============================="
          echo " CuanBot v4 — Action: $ACTION"
          echo "=============================="

          case "$ACTION" in
            "scan-only")
              echo "Mode: SCAN ONLY (tidak ada transaksi)"
              python main.py --scan-only
              ;;

            "dry-run")
              echo "Mode: DRY RUN (simulasi)"
              DRY_RUN=true python main.py --dry-run
              ;;

            "force-buy")
              if [ -z "$SYMBOL" ]; then
                echo "ERROR: Symbol harus diisi untuk force-buy!"
                echo "Contoh: DOGE, XRP, HBAR, FLOKI"
                exit 1
              fi
              echo "Mode: FORCE BUY $SYMBOL"
              python main.py --force-buy "$SYMBOL"
              ;;

            "force-sell")
              echo "Mode: FORCE SELL semua posisi"
              python main.py --force-sell
              ;;

            "auto"|*)
              echo "Mode: AUTO LIVE TRADING"
              python main.py --live
              ;;
          esac

      # ── 5. Simpan state ──────────────────────────────────────────
      - name: Save state
        if: always()
        run: |
          if [ -f state.json ]; then
            git config user.name "CuanBot"
            git config user.email "cuanbot@github.com"
            git checkout -B state
            git add -f state.json
            if ! git diff --cached --quiet; then
              TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M)
              TRADES=$(python3 -c "
          import json
          try:
              s=json.load(open('state.json'))
              print(len(s.get('trades_today',[])))
          except: print('?')
          " 2>/dev/null)
              PNL=$(python3 -c "
          import json
          try:
              s=json.load(open('state.json'))
              print(f\"{s.get('daily_pnl',0):+.0f}\")
          except: print('?')
          " 2>/dev/null)
              POSITIONS=$(python3 -c "
          import json
          try:
              s=json.load(open('state.json'))
              print(len(s.get('positions',[])))
          except: print('?')
          " 2>/dev/null)
              git commit -m "state: ${TIMESTAMP} | pos=${POSITIONS} | trades=${TRADES} | pnl=Rp${PNL}"
              git push origin state --force
              echo "State tersimpan"
            else
              echo "State tidak berubah"
            fi
          else
            echo "PERINGATAN: state.json tidak ditemukan!"
          fi

      # ── 6. Upload logs ───────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "logs-${{ github.run_number }}-${{ github.event.inputs.action || 'auto' }}"
          path: logs/
          retention-days: 14
